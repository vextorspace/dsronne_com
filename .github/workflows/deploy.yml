name: Deploy to Server

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          python dsronne_com/manage.py test
          
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_DEPLAY_PRIVATE_KEY }}
  
      - name: Add server to known_hosts
        run: echo "${{ secrets.SSH_KNOWN_HOST }}" >> ~/.ssh/known_hosts
   
      - name: Deploy to Server via SSH and Git Pull
        run: |
          ssh -A vextorspace@dsronne.com << 'EOF'
            cd ~/dsronne.com
            git pull origin main
            source .venv/bin/activate
            pip install -r requirements.txt
            python dsronne_com/manage.py migrate  
            python dsronne_com/manage.py collectstatic --noinput
            sudo systemctl restart gunicorn
          EOF

