{% extends 'dsronne_com/base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<h1>Register</h1>
<form method="post" action="{% url 'register' %}">
    {% csrf_token %}
    {% if form.non_field_errors %}
        <div class="errorlist">{{ form.non_field_errors }}</div>
    {% endif %}
    {{ form.as_p }}
    <button type="submit">Register</button>
</form>
{% endblock %}
